<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Auronix Drive</title>
    <link rel="stylesheet" href="contact.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <!--Cursor Animation-->
    <div class="cursor" id="cursor"></div>
    <div class="cursor-follower" id="cursorFollower"></div>
    <!--Navbar-->
    <nav class="navbar" id="navbar">
        <h1>Auronix Drive</h1>
        <ul class="navbar-nav" id="navList">
            <li><a href="home.html">Home</a></li>
            <li><a href="features.html">Features</a></li>
            <li><a href="model.html">Models</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="btn">
            <button>Login</button>
            <button>Sign in</button>
        </div>
    </nav>

    <!-- Contact Hero -->
    <section class="contact-hero">
        <h1>GET IN TOUCH</h1>
    </section>
    <!-- Contact Content -->
    <div class="contact-container">
        <div class="contact-grid">
            <!-- Contact Form -->
            <div class="contact-form">
                <h2 style="font-size: 2.5rem; margin-bottom: 2.5rem; text-align: center;">Send Message</h2>
                <form id="contactForm">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Name</label>
                        <input type="text" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-envelope"></i> Email</label>
                        <input type="email" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-phone"></i> Phone</label>
                        <input type="tel">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-message"></i> Message</label>
                        <textarea placeholder="Tell us about your dream Auronix..."></textarea>
                    </div>
                    <button type="submit" class="submit-btn">
                        <i class="fas fa-paper-plane"></i> Send Message
                    </button>
                </form>
            </div>

            <!-- Contact Info -->
            <div class="contact-info">
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-map-marker-alt"></i>
                    </div>
                    <div>
                        <h3>Showroom</h3>
                        <p>123 Future Drive<br>Tech City, CA 90210</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-phone"></i>
                    </div>
                    <div>
                        <h3>Call Us</h3>
                        <p>+1 (555) 123-AURO<br>Mon-Fri 9AM-8PM</p>
                    </div>
                </div>
                <div class="info-item">
                    <div class="info-icon">
                        <i class="fas fa-envelope"></i>
                    </div>
                    <div>
                        <h3>Email</h3>
                        <p>hello@auronixdrive.com<br>Response within 24h</p>
                    </div>
                </div>
                <!-- Map Placeholder -->
                <div class="map-container">
                    <div style="height: 100%; background: linear-gradient(45deg, #0ea5e9, #a855f7); display: flex; align-items: center; justify-content: center; color: white; font-size: 1.2rem;">
                        🗺️ Showroom Location
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Social Links -->
        <div class="social-links">
            <a href="#" class="social-link"><i class="fab fa-twitter"></i></a>
            <a href="#" class="social-link"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-link"><i class="fab fa-linkedin"></i></a>
            <a href="#" class="social-link"><i class="fab fa-youtube"></i></a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Highlight active page
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('.navbar-nav a').forEach(link => {
            if (link.getAttribute('href') === currentPage) {
                link.style.color = '#0ea5e9';
                link.style.fontWeight = '700';
            }
        });

        // Form submission
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('🎉 Message sent! We\'ll reply within 24 hours.');
            this.reset();
        });
    </script>
</body>
</html>
</body>
</html>
